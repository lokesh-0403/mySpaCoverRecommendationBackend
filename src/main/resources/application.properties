server.port=${SERVER_PORT:8080}
server.shutdown=graceful
server.forward-headers-strategy=framework

spring.application.name=mySpaCoverSkuRecommendation
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:10MB}
spring.mvc.async.request-timeout=${APP_ASYNC_REQUEST_TIMEOUT:300000}

logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.zasyaSolutions.mySpaCoverSkuRecommendation=${APP_LOG_LEVEL:INFO}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.storage.root=${APP_STORAGE_ROOT:data}
app.storage.uploads-dir=${APP_UPLOADS_DIR:uploads}
app.storage.results-dir=${APP_RESULTS_DIR:results}
app.execution.max-parallel-jobs=${APP_MAX_PARALLEL_JOBS:4}

app.inventory.base-url=${INVENTORY_API_BASE_URL:https://inventory-api.myspacover.com}
app.inventory.login-endpoint=${INVENTORY_API_LOGIN_ENDPOINT:/auth/login/web}
app.inventory.inventory-endpoint=${INVENTORY_API_INVENTORY_ENDPOINT:/inventory/inhand-quantity}
app.inventory.login-email=${INVENTORY_API_LOGIN_EMAIL:developer@secure.com}
app.inventory.login-password=${INVENTORY_API_LOGIN_PASSWORD:DeveloperZasya@secure.com}
app.inventory.webhook-key=${INVENTORY_API_WEBHOOK_KEY:22217870c81aa09243577ec0bc5eb0cd19f4fb4a70e067a0e65993e1ee7769fa}
app.inventory.connect-timeout=${INVENTORY_API_CONNECT_TIMEOUT:10s}
app.inventory.read-timeout=${INVENTORY_API_READ_TIMEOUT:60s}
